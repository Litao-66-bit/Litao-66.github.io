    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {

            }
            .card-shadow {
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            }
            .gradient-bg {
                background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            }
            .btn-primary {
                @apply bg-primary text-white px-4 py-2 rounded-full shadow-md hover:bg-opacity-90 transition-all;
            }
            .btn-secondary {
                @apply bg-secondary text-primary px-4 py-2 rounded-full shadow-md hover:bg-opacity-90 transition-all;
            }
            .nav-item {
                @apply flex flex-col items-center justify-center text-xs;
            }
            .nav-item.active {
                @apply text-primary;
            }
            .nav-item:not(.active) {
                @apply text-gray-500;
            }
            .mood-circle {
                @apply w-12 h-12 rounded-full flex items-center justify-center text-2xl cursor-pointer transition-transform hover:scale-110;
            }
            .mood-circle.filled {
                @apply border-2 border-primary;
            }

    <script>
        // 页面加载时执行
        window.onload = function() {
            // 心情选择
            const moodCircles = document.querySelectorAll('.mood-circle[data-mood]');
            moodCircles.forEach(circle => {
                circle.addEventListener('click', function() {
                    const mood = this.getAttribute('data-mood');
                    const date = this.getAttribute('data-date');
                    
                    // 如果是日历中的心情记录，显示详情
                    if (date) {
                        showMoodDetail(date, mood);
                    } else {
                        // 如果是今日心情选择，选中该心情
                        selectTodayMood(mood);
                    }
                });
            });
        };

        // 显示心情详情
        function showMoodDetail(date, mood) {
            const moodNames = {
                'happy': '愉悦',
                'calm': '平静',
                'anxious': '焦虑',
                'sad': '低落'
            };
            
            alert(`2026年${date}的心情：${moodNames[mood]}`);
        }

        // 选择今日心情
        function selectTodayMood(mood) {
            const moodCircles = document.querySelectorAll('.mood-circle[data-mood]:not([data-date])');
            moodCircles.forEach(circle => {
                circle.classList.remove('ring-2', 'ring-primary');
            });
            
            const selectedCircle = document.querySelector(`.mood-circle[data-mood="${mood}"]:not([data-date])`);
            selectedCircle.classList.add('ring-2', 'ring-primary');
            
            // 自动填充文本框
            const textarea = document.querySelector('textarea');
            const moodTexts = {
                'happy': '今天心情很好，感觉很愉悦！',
                'calm': '今天心情平静，一切都很顺利。',
                'anxious': '今天有些焦虑，需要调整一下。',
                'sad': '今天心情低落，希望明天会更好。'
            };
            
            if (!textarea.value) {
                textarea.value = moodTexts[mood];
            }
        }
    </script>
